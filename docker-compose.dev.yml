version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: personal-assistant-backend-dev
    ports:
      - "8000:8000"
      - "8001:8001/udp"  # UDP discovery port
    volumes:
      # Mount source code for hot reload
      - ./backend:/app
      # Mount user directories for file access
      - ~/Documents:/home/appuser/Documents:ro
      - ~/Downloads:/home/appuser/Downloads:ro
      - ~/Desktop:/home/appuser/Desktop:ro
      # Persist database data
      - device_data:/app/data
    environment:
      - GLM_API_KEY=${GLM_API_KEY}
      - GLM_API_BASE_URL=${GLM_API_BASE_URL:-https://open.bigmodel.cn/api/paas/v4/}
      - GLM_MODEL=${GLM_MODEL:-glm-4.7}
      - DEVICE_NAME=${DEVICE_NAME:-My Device}
      - DEVICE_MODE=${DEVICE_MODE:-primary}
      - PORT=8000
      - SCAN_PATHS=/home/appuser/Documents,/home/appuser/Downloads,/home/appuser/Desktop
      - DISCOVERY_PORT=8001
    networks:
      - personal-assistant-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: personal-assistant-frontend-dev
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      # Mount source code for hot reload
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - personal-assistant-network
    restart: unless-stopped

networks:
  personal-assistant-network:
    driver: bridge

volumes:
  device_data:
